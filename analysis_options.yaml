include: package:flutter_lints/flutter.yaml

linter:
  rules:
    # Estilo de código
    prefer_single_quotes: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    avoid_print: true
    avoid_unnecessary_containers: true
    prefer_is_empty: true
    prefer_is_not_empty: true
    prefer_typing_uninitialized_variables: false
    
    # Arquitectura
    one_member_abstracts: false  # Permitir interfaces de un solo método (puertos)
    implementation_imports: true  # No importar de otros módulos
    depend_on_referenced_packages: true
    
    # Manejo de errores
    only_throw_errors: false  # Permitir throw de Failure personalizados en dominio
    avoid_catching_errors: false  # Permitir catching de errores específicos
    
    # Null safety
    unnecessary_null_checks: true
    use_if_null_to_convert_nulls_to_bools: true
    
    # Funcional
    prefer_final_locals: true
    prefer_final_fields: true
    avoid_function_literals_in_foreach_calls: false
    
    # Documentación
    public_member_api_docs: false  # Opcional, activar si se requiere documentación completa
    lines_longer_than_80_chars: false  # Permitir líneas más largas
    
    # Widgets
    use_key_in_widget_constructors: true
    prefer_const_constructors_in_immutables: true
    
    # Async
    unawaited_futures: true  # Requerir await para todos los futures
    avoid_void_async: true

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
  
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  
  plugins:
    - custom_lint
  
  errors:
    # Tratar warnings como errores en CI/CD
    missing_required_param: error
    missing_return: error
    parameter_assignments: error
    
    # Ignorar ciertos warnings en desarrollo
    invalid_annotation_target: ignore  # Para Hive annotations
