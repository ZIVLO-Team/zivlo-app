name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Job de análisis estático
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Initialize Android project
        run: bash scripts/init-android.sh
      
      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # Formatting check disabled - format locally with: flutter format .
      # - name: Check formatting
      #   run: dart format --output=none --set-exit-if-changed .

  # Job de tests unitarios
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: analyze
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Run unit tests
        run: flutter test test/unit/ --coverage --coverage-path=coverage/lcov.info
      
      - name: Run BLoC tests
        run: flutter test test/bloc/ --coverage --coverage-path=coverage/lcov.info
      
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
