name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Job de análisis estático
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Initialize Android project
        run: bash scripts/init-android.sh
      
      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # Formatting check disabled - format locally with: flutter format .
      # - name: Check formatting
      #   run: dart format --output=none --set-exit-if-changed .

  # Job de tests unitarios
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: analyze
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Run unit tests
        run: flutter test test/unit/ --coverage --coverage-path=coverage/lcov.info
      
      - name: Run BLoC tests
        run: flutter test test/bloc/ --coverage --coverage-path=coverage/lcov.info
      
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Job de build de APK
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK Release
        run: flutter build apk --release --split-per-abi
      
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apks
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

  # Job de build de App Bundle (Play Store)
  build-appbundle:
    name: Build App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build App Bundle Release
        run: flutter build appbundle --release
      
      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # Job de notificación (opcional)
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [analyze, test, build-apk]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.build-apk.result }}" == "failure" ]; then
            echo "Build failed!"
            exit 1
          else
            echo "Build successful!"
          fi
